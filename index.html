<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fretmind</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #0f172a; color: white; user-select: none; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        @keyframes pulse-ring { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); } }
        .animate-ring { animation: pulse-ring 2s infinite; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }

        /* Maderas del Mástil */
        .wood-rosewood { background-color: #3e2723; border-color: #2e1a15; }
        .wood-maple { background-color: #e6c280; border-color: #c7a15a; }
        .wood-ebony { background-color: #1c1c1c; border-color: #000000; }
        
        /* Ajuste de color de líneas para maderas claras */
        .wood-maple .fret-wire { background-color: #888 !important; }
        .wood-maple .fret-dot { background-color: rgba(0,0,0,0.3) !important; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- CONTENEDOR PRINCIPAL DEL JUEGO -->
    <div id="app-container" class="min-h-screen flex flex-col relative">

        <!-- ================= PANTALLA: MENÚ ================= -->
        <div id="screen-menu" class="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 space-y-4 fade-in overflow-y-auto custom-scrollbar pb-12">
            <div class="text-center space-y-2 mt-4">
                <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent">
                    Fretmind
                </h1>
                <p class="text-slate-400 flex items-center justify-center gap-2 text-sm font-medium">
                    <i data-lucide="brain-circuit" class="w-4 h-4 text-emerald-400"></i> Entrena tu mente, domina tu guitarra
                </p>
            </div>

            <div class="bg-slate-800 p-5 sm:p-6 rounded-2xl w-full max-w-md shadow-xl border border-slate-700 space-y-6 mt-4">
                
                <!-- Sección: Accesibilidad e Instrumento -->
                <div class="grid grid-cols-2 gap-4 border-b border-slate-700 pb-4">
                    <!-- Instrumento -->
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 text-center">Instrumento</label>
                        <div class="flex bg-slate-900 p-1 rounded-lg">
                            <button onclick="setInstrument('guitar')" id="btn-inst-guitar" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all bg-blue-500 text-white shadow-lg">Guitarra</button>
                            <button onclick="setInstrument('bass')" id="btn-inst-bass" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all text-slate-500 hover:text-slate-300">Bajo</button>
                        </div>
                    </div>
                    <!-- Lateralidad -->
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 text-center">Lateralidad</label>
                        <div class="flex bg-slate-900 p-1 rounded-lg">
                            <button onclick="setHandedness('right')" id="btn-hand-right" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all bg-purple-500 text-white shadow-lg">Diestro</button>
                            <button onclick="setHandedness('left')" id="btn-hand-left" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all text-slate-500 hover:text-slate-300">Zurdo</button>
                        </div>
                    </div>
                    <!-- Madera (Ocupa las 2 columnas) -->
                    <div class="col-span-2">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 text-center">Color del Mástil</label>
                        <div class="flex justify-between bg-slate-900 p-1 rounded-lg gap-1">
                            <button onclick="setWood('rosewood')" id="btn-wood-rosewood" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all bg-[#4a2e15] text-white shadow-lg border border-[#3e2723]">Palisandro</button>
                            <button onclick="setWood('maple')" id="btn-wood-maple" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all bg-[#e6c280] text-slate-900 border border-[#c7a15a] opacity-50">Arce</button>
                            <button onclick="setWood('ebony')" id="btn-wood-ebony" class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all bg-[#1c1c1c] text-white border border-black opacity-50">Ébano</button>
                        </div>
                    </div>
                </div>

                <!-- Selector Trastes -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2 text-center flex justify-center items-center gap-1">
                        <i data-lucide="target" class="w-4 h-4 text-emerald-400"></i> Rango de preguntas (Hasta traste)
                    </label>
                    <div class="flex justify-between bg-slate-900 p-1 rounded-lg" id="fret-selector"></div>
                </div>

                <!-- Selector Tiempo -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2 text-center flex justify-center items-center gap-1">
                        <i data-lucide="timer" class="w-4 h-4 text-red-400"></i> Tiempo por pregunta
                    </label>
                    <div class="flex justify-between bg-slate-900 p-1 rounded-lg" id="time-selector"></div>
                </div>

                <!-- Botones de Modo -->
                <div class="space-y-3 pt-2">
                    <button onclick="startGame('identify')" class="w-full group relative flex items-center p-3 sm:p-4 bg-slate-700 hover:bg-slate-600 rounded-xl transition-all border border-slate-600 hover:border-emerald-500/50">
                        <div class="bg-emerald-500/20 p-2 sm:p-3 rounded-full mr-3 sm:mr-4 group-hover:bg-emerald-500 group-hover:text-slate-900 transition-colors text-emerald-500">
                            <i data-lucide="help-circle" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-base sm:text-lg">Modo Identificar</h3>
                            <p class="text-slate-400 text-xs sm:text-sm">¿Qué nota es el punto resaltado?</p>
                        </div>
                    </button>

                    <button onclick="startGame('find')" class="w-full group relative flex items-center p-3 sm:p-4 bg-slate-700 hover:bg-slate-600 rounded-xl transition-all border border-slate-600 hover:border-cyan-500/50">
                        <div class="bg-cyan-500/20 p-2 sm:p-3 rounded-full mr-3 sm:mr-4 group-hover:bg-cyan-500 group-hover:text-slate-900 transition-colors text-cyan-500">
                            <i data-lucide="search" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-base sm:text-lg">Modo Encontrar</h3>
                            <p class="text-slate-400 text-xs sm:text-sm">Busca notas en cuerdas específicas</p>
                        </div>
                    </button>
                </div>

                <button onclick="showStats()" class="w-full mt-2 sm:mt-4 flex justify-center items-center py-3 text-emerald-400 hover:text-emerald-300 font-bold transition-colors border-t border-slate-700">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 mr-2"></i> Dashboard de Progreso
                </button>
            </div>

            <!-- CRÉDITOS DEL AUTOR -->
            <div class="mt-4 text-center text-slate-500 text-[10px] sm:text-xs tracking-wider opacity-80">
                Idea original y diseño metodológico por<br>
                <span class="font-bold text-slate-400 text-sm">Juan Miguel Rios Redondo</span>
            </div>
        </div>

        <!-- ================= PANTALLA: JUEGO ================= -->
        <div id="screen-game" class="hidden flex-1 flex flex-col">
            <!-- Header -->
            <div class="bg-slate-800 p-4 flex justify-between items-center shadow-md z-30 relative">
                <button onclick="goToMenu()" class="p-2 hover:bg-slate-700 rounded-full transition-colors text-slate-300">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                
                <div id="timer-display" class="hidden items-center font-mono font-bold text-lg px-4 py-1 rounded-full text-emerald-400 bg-slate-700">
                    <i data-lucide="timer" class="w-4 h-4 mr-2"></i>
                    <span id="time-text">00:00</span>
                </div>

                <div class="flex space-x-4 sm:space-x-6 text-sm font-bold items-center">
                    <span class="text-slate-400 text-xs hidden sm:inline" id="total-q-text">Total: 0</span>
                    <div class="flex items-center text-amber-500 bg-slate-700 px-3 py-1 rounded-full shadow-inner">
                        <i data-lucide="trophy" class="w-3 h-3 mr-1"></i> <span id="streak-text">0</span>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-start p-1 sm:p-4 overflow-hidden pt-2 sm:pt-4 fade-in">
                
                <div id="question-header" class="mb-2 sm:mb-4 text-center h-[70px] sm:h-[80px] flex flex-col justify-center">
                    <!-- Rellenado por JS -->
                </div>

                <!-- Mástil Contenedor -->
                <div class="w-full max-w-5xl px-0 sm:px-1 flex flex-col items-center">
                    <!-- Clases de madera y layout (zurdo/diestro) se aplican aquí -->
                    <div id="fretboard-container" class="wood-rosewood relative flex w-full select-none rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] border-y-4 pb-2 sm:pb-4 pt-2 overflow-hidden transition-colors duration-300">
                        
                        <!-- Columna de cuerdas (1-6 o 1-4) -->
                        <div id="string-numbers" class="flex flex-col pr-1 sm:pr-2 pl-1 sm:pl-2 min-w-[15px] sm:min-w-[25px] bg-slate-900/70 z-20 justify-around py-4">
                            <!-- Generado por JS -->
                        </div>

                        <!-- Trastes (0-12) -->
                        <div id="fretboard" class="flex flex-1 py-4">
                            <!-- Generado por JS -->
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-md mt-4 sm:mt-6 h-[100px] flex items-center justify-center px-4">
                    <div id="feedback-panel" class="hidden text-center p-3 sm:p-4 rounded-xl w-full border slide-up shadow-lg">
                        <h3 id="feedback-text" class="text-lg sm:text-xl font-bold"></h3>
                    </div>

                    <div id="identify-options" class="hidden grid grid-cols-2 gap-3 sm:gap-4 w-full"></div>

                    <div id="find-instruction" class="hidden text-slate-400 text-xs sm:text-sm animate-pulse bg-slate-800 px-4 sm:px-6 py-2 sm:py-3 rounded-full border border-slate-700 text-center shadow-lg w-full max-w-[300px]">
                        Toca el traste en la cuerda iluminada ☝️
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= PANTALLA: ESTADÍSTICAS (DASHBOARD) ================= -->
        <div id="screen-stats" class="hidden flex-1 flex flex-col p-4 sm:p-6 space-y-6 overflow-y-auto fade-in custom-scrollbar">
            <div class="flex items-center justify-between">
                <button onclick="goToMenu()" class="p-2 hover:bg-slate-700 rounded-full transition-colors flex items-center text-slate-400">
                    <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i> Volver
                </button>
                <h2 class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent">Tu Progreso</h2>
                <div class="w-10"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto w-full pb-8">
                
                <!-- Mapa de Calor (Heatmap) -->
                <div class="col-span-1 md:col-span-2 bg-slate-800 p-4 sm:p-6 rounded-2xl border border-slate-700 shadow-xl">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center text-amber-500">
                            <i data-lucide="flame" class="w-5 h-5 mr-2"></i>
                            <h3 class="font-bold text-lg text-white">Mapa de Calor de Errores</h3>
                        </div>
                        <div class="text-xs text-slate-400 flex items-center gap-2">
                            <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-emerald-500 inline-block mr-1"></span> Fuerte</span>
                            <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 inline-block mr-1"></span> Débil</span>
                        </div>
                    </div>
                    <p class="text-sm text-slate-400 mb-4">Muestra los puntos específicos del mástil donde cometes más errores.</p>
                    
                    <!-- Fretboard miniatura para Heatmap -->
                    <div class="w-full overflow-x-auto custom-scrollbar pb-2">
                        <div id="heatmap-container" class="wood-ebony relative flex w-max min-w-full select-none rounded-lg shadow-inner border border-slate-600 pb-2 pt-1">
                            <div id="heatmap-strings" class="flex flex-col pr-1 pl-1 min-w-[15px] bg-slate-900/80 z-20 justify-around py-2"></div>
                            <div id="heatmap-board" class="flex flex-1 py-2"></div>
                        </div>
                    </div>
                </div>

                <!-- Global y Sugerencia -->
                <div id="stats-global-container" class="space-y-6"></div>
                
                <!-- Listas -->
                <div id="stats-lists-container" class="space-y-6"></div>

                <!-- Botón Reset -->
                <div class="col-span-1 md:col-span-2 flex justify-center mt-4">
                    <button onclick="resetStats()" class="flex items-center px-4 py-2 bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/30 rounded-lg transition-colors text-sm">
                        <i data-lucide="trash-2" class="w-4 h-4 mr-2"></i> Borrar Historial de Aprendizaje
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script>
        lucide.createIcons();

        // --- SISTEMA DE AUDIO (GUITARRA Y BAJO) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        const C0_FREQ = 16.3516; 

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playNote(stringIndex, fretNumber) {
            initAudio();
            if(!audioCtx) return;

            const inst = INSTRUMENTS[state.instrument];
            const baseOffset = inst.offsets[stringIndex]; 
            const totalSemitones = baseOffset + fretNumber;
            const freq = C0_FREQ * Math.pow(2, totalSemitones / 12);

            const osc = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'triangle'; 
            osc2.type = 'sawtooth'; 
            
            filter.type = 'lowpass';
            const filterMultiplier = state.instrument === 'bass' ? 4 : 8; 
            filter.frequency.setValueAtTime(freq * filterMultiplier, audioCtx.currentTime); 
            filter.frequency.exponentialRampToValueAtTime(freq * 1.2, audioCtx.currentTime + 0.3);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(state.instrument === 'bass' ? 0.8 : 0.6, audioCtx.currentTime + 0.02); 
            
            const decayTime = (stringIndex >= (inst.strings.length / 2)) ? 3.5 : 2.0; 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + decayTime);

            osc.connect(filter);
            
            const osc2Gain = audioCtx.createGain();
            osc2Gain.gain.value = state.instrument === 'bass' ? 0.4 : 0.3; 
            osc2.connect(osc2Gain);
            osc2Gain.connect(filter);

            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.frequency.value = freq;
            osc2.frequency.value = freq;

            osc.start();
            osc2.start();
            osc.stop(audioCtx.currentTime + decayTime);
            osc2.stop(audioCtx.currentTime + decayTime);
        }

        // --- CONSTANTES GLOBALES Y DATOS ---
        const NOTES_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const NOTES_FLAT =  ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const FRET_MARKERS = [3, 5, 7, 9, 12];
        const FRET_LIMITS = [3, 5, 7, 9, 12];
        const TIME_LIMITS = [0, 5, 10, 15, 20];

        const INSTRUMENTS = {
            guitar: {
                strings: ['E', 'B', 'G', 'D', 'A', 'E'],
                offsets: [52, 47, 43, 38, 33, 28] 
            },
            bass: {
                strings: ['G', 'D', 'A', 'E'],
                offsets: [31, 26, 21, 16] 
            }
        };

        // --- ESTADO Y LOCALSTORAGE ---
        let state = {
            instrument: 'guitar', 
            handedness: 'right', 
            wood: 'rosewood', 
            maxFret: 5,
            timeLimit: 0,
            mode: 'identify',
            score: 0, total: 0, streak: 0, currentQ: null, timer: null, timeLeft: 0, isFeedbackMode: false,
            stats: { 
                totalAnswers: 0, correctAnswers: 0, noteHistory: {}, posHistory: {}
            }
        };

        function initData() {
            NOTES_SHARP.forEach(n => { if(!state.stats.noteHistory[n]) state.stats.noteHistory[n] = { correct: 0, wrong: 0 }; });
        }

        function loadStats() {
            const saved = localStorage.getItem('maestroStatsV2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if(parsed.noteHistory) state.stats = parsed;
                } catch(e) {}
            }
            initData();
        }

        function saveStats() {
            localStorage.setItem('maestroStatsV2', JSON.stringify(state.stats));
        }

        window.resetStats = () => {
            if(confirm("¿Estás seguro de borrar todo tu progreso y empezar de cero?")) {
                localStorage.removeItem('maestroStatsV2');
                state.stats = { totalAnswers: 0, correctAnswers: 0, noteHistory: {}, posHistory: {} };
                initData();
                showStats(); 
            }
        }

        const el = id => document.getElementById(id);

        function getNoteAt(strIdx, fretNum, useFlats) {
            const arr = useFlats ? NOTES_FLAT : NOTES_SHARP;
            const inst = INSTRUMENTS[state.instrument];
            const noteIndex = (inst.offsets[strIdx] + fretNum) % 12;
            return arr[noteIndex];
        }

        // --- MENÚ Y SETTINGS ---
        window.setInstrument = (val) => { 
            state.instrument = val; 
            el('btn-inst-guitar').className = `flex-1 py-1.5 rounded-md text-xs font-bold transition-all ${val==='guitar'?'bg-blue-500 text-white shadow-lg':'text-slate-500 hover:text-slate-300'}`;
            el('btn-inst-bass').className = `flex-1 py-1.5 rounded-md text-xs font-bold transition-all ${val==='bass'?'bg-blue-500 text-white shadow-lg':'text-slate-500 hover:text-slate-300'}`;
        };
        window.setHandedness = (val) => { 
            state.handedness = val; 
            el('btn-hand-right').className = `flex-1 py-1.5 rounded-md text-xs font-bold transition-all ${val==='right'?'bg-purple-500 text-white shadow-lg':'text-slate-500 hover:text-slate-300'}`;
            el('btn-hand-left').className = `flex-1 py-1.5 rounded-md text-xs font-bold transition-all ${val==='left'?'bg-purple-500 text-white shadow-lg':'text-slate-500 hover:text-slate-300'}`;
        };
        window.setWood = (val) => {
            state.wood = val;
            const btnR = el('btn-wood-rosewood'), btnM = el('btn-wood-maple'), btnE = el('btn-wood-ebony');
            btnR.style.opacity = val === 'rosewood' ? '1' : '0.5';
            btnM.style.opacity = val === 'maple' ? '1' : '0.5';
            btnE.style.opacity = val === 'ebony' ? '1' : '0.5';
        }

        function renderMenuSelectors() {
            el('fret-selector').innerHTML = FRET_LIMITS.map(num => `
                <button onclick="setMaxFret(${num})" class="flex-1 py-2 rounded-md text-sm font-bold transition-all ${state.maxFret === num ? 'bg-amber-500 text-slate-900 shadow-lg scale-105' : 'text-slate-500 hover:text-slate-300'}">${num}</button>
            `).join('');
            el('time-selector').innerHTML = TIME_LIMITS.map(num => `
                <button onclick="setTimeLimit(${num})" class="flex-1 py-2 rounded-md text-sm font-bold transition-all ${state.timeLimit === num ? 'bg-emerald-500 text-slate-900 shadow-lg scale-105' : 'text-slate-500 hover:text-slate-300'}">${num === 0 ? 'Libre' : num+'s'}</button>
            `).join('');
        }

        window.setMaxFret = (val) => { state.maxFret = val; renderMenuSelectors(); };
        window.setTimeLimit = (val) => { state.timeLimit = val; renderMenuSelectors(); };

        window.goToMenu = () => {
            clearInterval(state.timer);
            el('screen-game').classList.add('hidden');
            el('screen-stats').classList.add('hidden');
            el('screen-menu').classList.remove('hidden');
            renderMenuSelectors();
        };

        window.showStats = () => {
            el('screen-menu').classList.add('hidden');
            el('screen-stats').classList.remove('hidden');
            renderStatsHTML();
        };

        window.startGame = (mode) => {
            initAudio(); 
            state.mode = mode;
            state.score = 0; state.total = 0; state.streak = 0;
            el('streak-text').innerText = '0';
            el('total-q-text').innerText = 'Total: 0';
            
            // Aplicar la madera al contenedor en el modo juego
            const fContainer = el('fretboard-container');
            // Removemos clases anteriores de madera y agregamos la nueva
            fContainer.classList.remove('wood-rosewood', 'wood-maple', 'wood-ebony');
            fContainer.classList.add(`wood-${state.wood}`);

            el('screen-menu').classList.add('hidden');
            el('screen-game').classList.remove('hidden');
            nextQuestion();
        };

        // --- LÓGICA DE JUEGO ---
        function nextQuestion() {
            state.isFeedbackMode = false;
            hideFeedback();
            
            const isFlatsRound = Math.random() > 0.5;
            const instStrings = INSTRUMENTS[state.instrument].strings.length;

            const validPos = [];
            for (let s = 0; s < instStrings; s++) {
                for (let f = 0; f <= state.maxFret; f++) {
                    const internalNote = getNoteAt(s, f, false); 
                    const displayNote = getNoteAt(s, f, isFlatsRound); 
                    const posKey = `${state.instrument}_${s}_${f}`;
                    
                    let weight = 1;
                    const nHist = state.stats.noteHistory[internalNote];
                    const pHist = state.stats.posHistory[posKey];
                    
                    let errTotal = 0;
                    if (nHist) errTotal += (nHist.wrong - nHist.correct);
                    if (pHist) errTotal += (pHist.wrong * 2 - pHist.correct); 
                    
                    if (errTotal > 0) weight = 1 + errTotal;
                    
                    for (let i = 0; i < weight; i++) {
                        validPos.push({ string: s, fret: f, targetNote: displayNote, internalNote, useFlats: isFlatsRound });
                    }
                }
            }

            const q = validPos[Math.floor(Math.random() * validPos.length)];
            
            let opts = [];
            if (state.mode === 'identify') {
                opts = [q.targetNote];
                const pool = isFlatsRound ? NOTES_FLAT : NOTES_SHARP;
                while (opts.length < 4) {
                    const r = pool[Math.floor(Math.random() * pool.length)];
                    if (!opts.includes(r)) opts.push(r);
                }
                opts.sort(() => Math.random() - 0.5);
            }
            q.options = opts;
            state.currentQ = q;

            renderGameUI();
            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            if (state.timeLimit === 0) { el('timer-display').classList.add('hidden'); return; }
            state.timeLeft = state.timeLimit;
            const tDisp = el('timer-display'); const tText = el('time-text');
            tDisp.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'animate-pulse');
            tDisp.classList.add('text-emerald-400', 'bg-slate-700');
            tText.innerText = `00:${state.timeLeft.toString().padStart(2, '0')}`;

            state.timer = setInterval(() => {
                if(state.isFeedbackMode) return clearInterval(state.timer);
                state.timeLeft--;
                tText.innerText = `00:${state.timeLeft.toString().padStart(2, '0')}`;
                if(state.timeLeft <= 3) {
                    tDisp.classList.remove('text-emerald-400', 'bg-slate-700');
                    tDisp.classList.add('text-red-500', 'bg-red-500/10', 'animate-pulse');
                }
                if (state.timeLeft <= 0) { clearInterval(state.timer); handleAnswer(null, true); }
            }, 1000);
        }

        window.answerIdentify = (noteStr) => { if (!state.isFeedbackMode) handleAnswer({ type: 'identify', val: noteStr }); };
        window.answerFind = (strIdx, fretNum) => { if (!state.isFeedbackMode && state.mode === 'find') handleAnswer({ type: 'find', string: strIdx, fret: fretNum }); };

        function handleAnswer(ans, isTimeout = false) {
            state.isFeedbackMode = true;
            clearInterval(state.timer);
            const q = state.currentQ;
            let isCorrect = false; let clickedPos = null;

            if (!isTimeout) {
                if (ans.type === 'identify') isCorrect = ans.val === q.targetNote;
                else {
                    clickedPos = { s: ans.string, f: ans.fret };
                    const clickedNote = getNoteAt(ans.string, ans.fret, q.useFlats);
                    isCorrect = clickedNote === q.targetNote && ans.string === q.string;
                }
            }

            state.stats.totalAnswers++;
            if (isCorrect) state.stats.correctAnswers++;
            
            state.stats.noteHistory[q.internalNote][isCorrect ? 'correct' : 'wrong']++;
            
            const posKey = `${state.instrument}_${q.string}_${q.fret}`;
            if(!state.stats.posHistory[posKey]) state.stats.posHistory[posKey] = { correct:0, wrong:0 };
            state.stats.posHistory[posKey][isCorrect ? 'correct' : 'wrong']++;
            
            saveStats();

            state.total++;
            el('total-q-text').innerText = `Total: ${state.total}`;

            if (isCorrect) {
                state.score++; state.streak++;
                showFeedback('success', '¡Correcto!');
                playNote(q.string, q.fret); 
            } else {
                state.streak = 0;
                let msg = `¡Tiempo agotado! Era un ${q.targetNote}`;
                if (!isTimeout) {
                    if (state.mode === 'identify') msg = `Incorrecto. Era un ${q.targetNote}`;
                    else {
                        msg = `Incorrecto. Tocaste un ${getNoteAt(ans.string, ans.fret, q.useFlats)} (Cuerda ${ans.string+1})`;
                        playNote(ans.string, ans.fret);
                    }
                }
                showFeedback('error', msg);
                if (state.mode === 'identify' || isTimeout) setTimeout(() => playNote(q.string, q.fret), 400); 
            }
            el('streak-text').innerText = state.streak;
            renderFretboard(clickedPos);
            setTimeout(nextQuestion, 2500);
        }

        function showFeedback(type, msg) {
            el('identify-options').classList.add('hidden'); el('find-instruction').classList.add('hidden');
            const p = el('feedback-panel'); const t = el('feedback-text');
            p.classList.remove('hidden', 'bg-emerald-500/20', 'border-emerald-500', 'text-emerald-400', 'bg-red-500/20', 'border-red-500', 'text-red-400');
            if(type === 'success') p.classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-400');
            else p.classList.add('bg-red-500/20', 'border-red-500', 'text-red-400');
            t.innerText = msg;
        }

        function hideFeedback() {
            el('feedback-panel').classList.add('hidden');
            if(state.mode === 'identify') el('identify-options').classList.remove('hidden');
            else el('find-instruction').classList.remove('hidden');
        }

        function renderGameUI() {
            const q = state.currentQ; const h = el('question-header');
            if (state.mode === 'identify') {
                h.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold mb-1">¿Qué nota es esta?</h2><p class="text-slate-400 text-sm sm:text-base">Cuerda ${q.string + 1} • ${q.fret === 0 ? 'Al aire' : `Traste ${q.fret}`}</p>`;
                el('identify-options').innerHTML = q.options.map(note => `<button onclick="answerIdentify('${note}')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 hover:border-emerald-500 text-white font-bold py-2 sm:py-3 rounded-xl shadow-lg active:scale-95 transition-all text-sm sm:text-base">${note}</button>`).join('');
            } else {
                h.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold mb-1">Encuentra <span class="text-amber-400 text-2xl sm:text-3xl mx-1">${q.targetNote}</span></h2><div><span class="text-cyan-300 font-bold bg-cyan-900/30 px-3 py-1 rounded-full inline-block border border-cyan-500/30 text-xs sm:text-sm">Cuerda ${q.string + 1}</span></div>`;
            }
            renderFretboard(null);
        }

        function renderFretboard(clickedPos) {
            const strNums = el('string-numbers'); const board = el('fretboard');
            const q = state.currentQ;
            const instStrings = INSTRUMENTS[state.instrument].strings;
            const isLeft = state.handedness === 'left';
            
            // Aplicar Inversión del contenedor para Zurdos
            const fContainer = el('fretboard-container');
            if (isLeft) {
                fContainer.classList.add('flex-row-reverse');
                board.classList.add('flex-row-reverse');
            } else {
                fContainer.classList.remove('flex-row-reverse');
                board.classList.remove('flex-row-reverse');
            }

            const stringHeightClass = state.instrument === 'bass' ? "h-12 sm:h-14" : "h-8 sm:h-10";
            const dotSizeClass = "w-5 h-5 sm:w-7 sm:h-7 text-[9px] sm:text-xs";

            strNums.innerHTML = instStrings.map((_, idx) => `<div class="${stringHeightClass} flex items-center justify-center font-bold text-[10px] sm:text-sm ${state.mode === 'find' && q.string === idx ? 'text-cyan-400 scale-110' : 'text-slate-400'}">${idx + 1}</div>`).join('');

            let boardHTML = '';
            
            // Lógica posicional visual (izq/der) dependiendo de la lateralidad
            const wireSide = isLeft ? 'left-0' : 'right-0';
            const nutBorder = isLeft ? 'border-l-2 sm:border-l-[3px]' : 'border-r-2 sm:border-r-[3px]';

            for (let f = 0; f <= 12; f++) {
                const isOutOfBounds = f > state.maxFret;
                let columnHTML = `<div class="relative flex flex-col justify-around ${f === 0 ? 'flex-[0.8]' : 'flex-1'} ${isOutOfBounds ? 'opacity-40' : ''} transition-opacity duration-300">`;
                
                columnHTML += `<div class="absolute -bottom-4 sm:-bottom-6 left-1/2 -translate-x-1/2 text-slate-400 text-[9px] sm:text-xs font-bold">${f===0?'0':f}</div>`;
                
                // Trastes de Metal (dibujados en el lado correcto según zurdo/diestro)
                if(f > 0) columnHTML += `<div class="fret-wire absolute ${wireSide} top-[5%] bottom-[5%] w-[1px] sm:w-[2px] bg-slate-300/60 z-10 shadow-sm"></div>`;
                
                // Cejuela / Hueso (dibujada en el lado opuesto para Zurdos)
                if(f === 0) columnHTML += `<div class="absolute ${wireSide} top-[5%] bottom-[5%] w-[3px] sm:w-[5px] ${nutBorder} border-double border-[#eecfa1] z-10 bg-[#cfb588]"></div>`;

                if(FRET_MARKERS.includes(f) && f > 0 && f !== 12) columnHTML += `<div class="fret-dot absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-slate-200/30"></div>`;
                if(f === 12) columnHTML += `<div class="fret-dot absolute top-[25%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-slate-200/30"></div><div class="fret-dot absolute top-[75%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-slate-200/30"></div>`;

                for (let s = 0; s < instStrings.length; s++) {
                    const isMainTarget = q.string === s && q.fret === f;
                    const actualNote = getNoteAt(s, f, q.useFlats);
                    const isCorrectAnswerForFind = state.mode === 'find' && q.string === s && q.targetNote === actualNote;
                    const userClickedHere = clickedPos && clickedPos.s === s && clickedPos.f === f;
                    
                    let dotClasses = `relative z-20 rounded-full flex items-center justify-center font-bold shadow-lg transition-all duration-300 ${dotSizeClass} opacity-0`;
                    let dotText = '';

                    if (!state.isFeedbackMode) {
                        if (state.mode === 'identify' && isMainTarget) {
                            dotClasses = dotClasses.replace('opacity-0', 'bg-amber-500 text-slate-900 scale-100 opacity-100 animate-ring');
                            dotText = '?';
                        }
                        if (state.mode === 'find' && q.string === s && !isOutOfBounds) dotText = actualNote; 
                    } else {
                        dotText = actualNote;
                        if (state.mode === 'identify' && isMainTarget) dotClasses = dotClasses.replace('opacity-0', 'bg-emerald-500 text-slate-900 scale-110 opacity-100 ring-2 sm:ring-4 ring-emerald-500/30');
                        if (state.mode === 'find' && isCorrectAnswerForFind) dotClasses = dotClasses.replace('opacity-0', 'bg-emerald-500 text-slate-900 scale-110 opacity-100 ring-2 sm:ring-4 ring-emerald-500/30');
                        if (userClickedHere && (!isCorrectAnswerForFind && state.mode==='find')) dotClasses = dotClasses.replace('opacity-0', 'bg-red-500 text-white scale-100 opacity-100');
                    }

                    const thicknessBase = state.instrument === 'bass' ? 1.5 : 1;
                    const stringLineH = Math.max(1, thicknessBase + s * (state.instrument==='bass'?0.6:0.4));
                    const lineHighlight = (state.mode === 'find' && q.string === s && !state.isFeedbackMode) ? 'bg-cyan-300/60 shadow-[0_0_8px_rgba(6,182,212,0.5)]' : '';
                    
                    const strColor = f===0 ? 'bg-slate-300' : 'bg-slate-400';

                    columnHTML += `<div class="relative ${stringHeightClass} flex items-center justify-center cursor-pointer group" onclick="answerFind(${s}, ${f})"><div class="absolute w-full shadow-sm transition-all ${strColor} ${lineHighlight}" style="height: ${stringLineH}px; opacity: 0.9;"></div><div class="${dotClasses}">${dotText}</div></div>`;
                }
                columnHTML += `</div>`;
                boardHTML += columnHTML;
            }
            board.innerHTML = boardHTML;
        }

        // --- RENDER HEATMAP Y STATS ---
        function getHeatmapColor(correct, wrong) {
            const total = correct + wrong;
            if(total === 0) return 'opacity-0'; 
            const acc = correct / total;
            if(acc > 0.8) return 'bg-emerald-500/80 text-white opacity-100 scale-90'; 
            if(acc < 0.5) return 'bg-red-500 text-white opacity-100 ring-2 ring-red-500/50 scale-110'; 
            return 'bg-amber-500/80 text-white opacity-100 scale-90'; 
        }

        function renderStatsHTML() {
            const acc = state.stats.totalAnswers > 0 ? Math.round((state.stats.correctAnswers / state.stats.totalAnswers) * 100) : 0;
            
            // RENDER HEATMAP
            const hContainer = el('heatmap-container');
            const hBoard = el('heatmap-board');
            const hStrings = el('heatmap-strings');
            const instStrings = INSTRUMENTS[state.instrument].strings;
            const isLeft = state.handedness === 'left';
            
            // Invertir Heatmap si es zurdo
            if (isLeft) {
                hContainer.classList.add('flex-row-reverse');
                hBoard.classList.add('flex-row-reverse');
            } else {
                hContainer.classList.remove('flex-row-reverse');
                hBoard.classList.remove('flex-row-reverse');
            }

            hStrings.innerHTML = instStrings.map((_, idx) => `<div class="h-6 flex items-center justify-center font-bold text-[10px] text-slate-500 px-1">${idx + 1}</div>`).join('');
            
            let heatmapHTML = '';
            const wireSide = isLeft ? 'left-0' : 'right-0';
            
            for (let f = 0; f <= 12; f++) {
                let colHTML = `<div class="relative flex flex-col justify-around ${f===0?'flex-[0.8]':'flex-1'} min-w-[30px] sm:min-w-[40px] px-0.5">`;
                colHTML += `<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-slate-500 text-[8px] font-bold">${f===0?'0':f}</div>`;
                
                // Trastes Heatmap (respetando lado zurdo/diestro)
                if(f > 0) colHTML += `<div class="absolute ${wireSide} top-[5%] bottom-[5%] w-[1px] bg-slate-500/50 z-10"></div>`;
                
                for (let s = 0; s < instStrings.length; s++) {
                    const posKey = `${state.instrument}_${s}_${f}`;
                    const pData = state.stats.posHistory[posKey] || {correct:0, wrong:0};
                    const colorClass = getHeatmapColor(pData.correct, pData.wrong);
                    const note = getNoteAt(s, f, false); 

                    colHTML += `
                        <div class="relative h-6 flex items-center justify-center">
                            <div class="absolute w-full bg-slate-500/40" style="height: 1px;"></div>
                            <div class="relative z-20 w-4 h-4 sm:w-5 sm:h-5 rounded-full flex items-center justify-center font-bold text-[7px] sm:text-[9px] transition-all ${colorClass}">
                                ${pData.correct + pData.wrong > 0 ? note : ''}
                            </div>
                        </div>
                    `;
                }
                colHTML += `</div>`;
                heatmapHTML += colHTML;
            }
            hBoard.innerHTML = heatmapHTML;

            // RENDER GLOBAL & LISTAS
            const noteData = Object.entries(state.stats.noteHistory).map(([note, data]) => {
                const total = data.correct + data.wrong;
                return { note, accuracy: total > 0 ? (data.correct / total) : 0, total, wrong: data.wrong, correct: data.correct };
            });

            const played = noteData.filter(n => n.total > 2);
            const weaknesses = [...played].sort((a,b) => a.accuracy === b.accuracy ? b.wrong - a.wrong : a.accuracy - b.accuracy).slice(0,3);
            const strengths = [...played].sort((a,b) => b.accuracy === a.accuracy ? b.correct - a.correct : b.accuracy - a.accuracy).slice(0,3);

            let suggestion = "Juega unas cuantas rondas para que pueda analizar tus patrones.";
            if (weaknesses.length > 0) {
                const w = weaknesses[0].note;
                if (['B', 'C'].includes(w)) suggestion = "Recordatorio: Del Si (B) al Do (C) no hay traste intermedio. Es solo un semitono.";
                else if (['E', 'F'].includes(w)) suggestion = "Recordatorio: Del Mi (E) al Fa (F) no hay traste intermedio. Mueve un solo traste.";
                else if (w.includes('#')) suggestion = `Recuerda las enarmonías: ${w} se toca en el mismo traste que su equivalente en bemol.`;
                else suggestion = `Céntrate en ubicar los ${w} usando octavas: dos cuerdas abajo, dos trastes a la derecha.`;
            }

            el('stats-global-container').innerHTML = `
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
                   <div class="flex items-center text-emerald-400 mb-4"><i data-lucide="activity" class="w-5 h-5 mr-2"></i><h3 class="font-bold text-lg text-white">Rendimiento</h3></div>
                   <div class="flex justify-around items-end h-16">
                      <div class="text-center"><p class="text-3xl font-bold text-emerald-400">${acc}%</p><p class="text-slate-400 text-xs">Precisión</p></div>
                      <div class="text-center"><p class="text-3xl font-bold text-blue-400">${state.stats.totalAnswers}</p><p class="text-slate-400 text-xs">Respuestas</p></div>
                   </div>
                </div>
                <div class="bg-amber-900/20 p-6 rounded-2xl border border-amber-500/30 shadow-lg">
                   <div class="flex items-center text-amber-400 mb-4"><i data-lucide="lightbulb" class="w-5 h-5 mr-2"></i><h3 class="font-bold text-lg text-white">Coach Virtual</h3></div>
                   <p class="text-amber-200/80 text-sm leading-relaxed">${suggestion}</p>
                </div>
            `;

            const renderList = (list, color, isWeak) => list.length === 0 ? `<p class="text-slate-500 text-sm">Faltan datos.</p>` :
                `<div class="space-y-3">` + list.map(item => `
                    <div class="flex justify-between items-center bg-slate-900/50 p-2 rounded-lg">
                       <span class="font-bold w-8 text-center text-${color}-400">${item.note}</span>
                       <div class="flex-1 mx-3 bg-slate-700 h-1.5 rounded-full overflow-hidden">
                         <div class="bg-${color}-500 h-full" style="width: ${Math.max(10, item.accuracy * 100)}%"></div>
                       </div>
                       <span class="text-[10px] text-slate-400 w-12 text-right">${Math.round(item.accuracy * 100)}%</span>
                     </div>
                `).join('') + `</div>`;

            el('stats-lists-container').innerHTML = `
                <div class="bg-red-900/10 p-6 rounded-2xl border border-red-500/20 shadow-lg mb-6">
                   <div class="flex items-center text-red-400 mb-4"><i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i><h3 class="font-bold text-base text-white">Notas Débiles</h3></div>
                   ${renderList(weaknesses, 'red', true)}
                </div>
                <div class="bg-emerald-900/10 p-6 rounded-2xl border border-emerald-500/20 shadow-lg">
                   <div class="flex items-center text-emerald-400 mb-4"><i data-lucide="trophy" class="w-4 h-4 mr-2"></i><h3 class="font-bold text-base text-white">Notas Fuertes</h3></div>
                   ${renderList(strengths, 'emerald', false)}
                </div>
            `;
            lucide.createIcons();
        }

        // --- INICIALIZACIÓN ---
        loadStats();
        renderMenuSelectors();
        setInstrument('guitar');
        setHandedness('right');
        setWood('rosewood');

    </script>
</body>
</html>
